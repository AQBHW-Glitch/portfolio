<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>作品集二维码</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #f5f3f0; font-family: system-ui, sans-serif;
  }
  .card {
    background: #fff; border-radius: 20px; padding: 40px; box-shadow: 0 8px 32px rgba(0,0,0,.08);
    text-align: center; max-width: 360px;
  }
  h1 { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .sub { color: #888; font-size: 14px; margin-bottom: 24px; }
  #qrcode { display: inline-block; padding: 16px; background: #fff; border-radius: 12px; }
  .url {
    margin-top: 16px; padding: 10px 16px; background: #f5f3f0; border-radius: 8px;
    font-size: 13px; color: #555; word-break: break-all; font-family: monospace;
  }
  .tip { margin-top: 12px; font-size: 12px; color: #aaa; }
</style>
</head>
<body>
<div class="card">
  <h1>📷 扫码查看作品集</h1>
  <p class="sub">梁国圳 · 个人作品集</p>
  <div id="qrcode"></div>
  <div class="url">https://aqbhw-glitch.github.io/portfolio/</div>
  <p class="tip">截图此页面分享给他人</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
  new QRCode(document.getElementById('qrcode'), {
    text: 'https://aqbhw-glitch.github.io/portfolio/',
    width: 220,
    height: 220,
    colorDark: '#1a1a1a',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
</script>
</body>
</html>
